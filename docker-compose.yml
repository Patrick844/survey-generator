services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: survey
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d survey"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./survey
      dockerfile: Dockerfile.backend
    env_file:
      - ./survey/.env
    environment:
      # Override the .env values that only make sense for local (non-Docker) runs
      DATABASE_URL: postgresql://postgres:postgres@db:5432/survey
      # Public address employees reach the Streamlit UI at. Defaults to localhost
      # for local runs; set FRONTEND_URL in the environment to deploy publicly.
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8501}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # React employee chat UI (served by nginx). Serves on the same port the
  # shareable survey links use (8501). The old Streamlit UI still lives in
  # ./survey (Dockerfile.frontend) for rollback.
  frontend:
    build:
      context: ./survey-employee
      dockerfile: Dockerfile
      args:
        # Baked into the bundle so the employee's browser calls the right backend.
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "8501:80"
    depends_on:
      - backend

  # React admin survey generator (served by nginx)
  generator:
    build:
      context: ./survey generator
      dockerfile: Dockerfile
      args:
        # Baked into the React bundle so the admin's browser calls the right
        # backend. Defaults to localhost; set VITE_API_BASE to deploy publicly.
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
